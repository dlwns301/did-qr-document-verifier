<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>DID QR Document Verifier</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
    <div class="card">

        <h1>DID QR Document Verifier</h1>

        <p class="description">
            전자문서를 등록하면 SHA-256 해시와 QR 기반 검증 링크가 생성됩니다.
            문서 원본 대신 해시를 저장하여 위변조 여부를 검증합니다.
        </p>

        <form action="/documents" method="post">

            <div class="form-group">
                <label>문서 제목</label>
                <input type="text" name="title" required>
            </div>

            <div class="form-group">
                <label>발급자 DID</label>
                <input
                        type="text"
                        name="issuerDid"
                        value="did:example:issuer-001"
                        required>
            </div>

            <div class="form-group">
                <label>문서 내용</label>

                <textarea
                        name="content"
                        rows="10"
                        required></textarea>
            </div>

            <button type="submit">
                문서 등록하기
            </button>

        </form>

    </div>
</div>

</body>
</html>
